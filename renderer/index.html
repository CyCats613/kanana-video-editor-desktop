<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
<title>Kanana 動画編集</title>
<style>
:root{--bg:#f6f4ec;--panel:#fffdf6;--panel2:#fbf8ef;--border:#e3ddcd;--hair:#eae4d6;--accent:#267b7d;--accent2:#1d6365;--ink:#33362f;--muted:#7d8177;--muted2:#9c9a8c;--red:#c0392b;--radius:16px;
--mono:ui-monospace,"SF Mono",Consolas,monospace;--sans:-apple-system,"Segoe UI","Hiragino Sans","Noto Sans JP",system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.65}
header{height:52px;display:flex;align-items:center;gap:12px;padding:0 20px;background:var(--panel);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5}
.logo{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--accent)}
.logo span{color:var(--muted);font-weight:400}
.badge{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid var(--border);color:var(--muted);background:var(--panel2)}
.badge.on{color:var(--accent);border-color:var(--accent)}
main{max-width:1000px;margin:0 auto;padding:20px;display:grid;gap:14px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
h2{font-size:12px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:8px 0 4px}
input,select{width:100%;border:1px solid var(--border);border-radius:10px;background:#fff;color:var(--ink);font:inherit;padding:9px 10px;outline:none}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(38,123,125,.18)}
input[type=checkbox]{width:auto;inline-size:16px;block-size:16px;padding:0;margin:0;accent-color:var(--accent);cursor:pointer}
label.check{display:flex;align-items:center;gap:8px;font-weight:500;color:var(--ink);cursor:pointer;margin:10px 0}
button{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:1px solid var(--border);background:var(--panel);color:var(--muted);padding:9px 16px;border-radius:10px;font:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
button:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
button:disabled{opacity:.45;cursor:default}
.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.primary:hover:not(:disabled){background:var(--accent2);color:#fff}
.danger{color:var(--red);border-color:#e7b1b1}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.muted{color:var(--muted2);font-size:12px}
.drop{border:2px dashed var(--border);border-radius:var(--radius);padding:26px;text-align:center;cursor:pointer;transition:.15s;background:var(--panel2)}
.drop:hover,.drop.active{border-color:var(--accent);background:#f2f7f4}
.drop .big{font-size:28px;margin-bottom:6px}
.file{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-top:10px}
.file b{overflow-wrap:anywhere}
.bar{height:8px;background:var(--hair);border-radius:99px;overflow:hidden;margin:10px 0 6px}
.bar>i{display:block;height:100%;width:0;background:var(--accent);border-radius:99px;transition:width .2s}
pre{white-space:pre-wrap;overflow:auto;max-height:180px;background:#101827;color:#e7edf8;border-radius:12px;padding:10px;font-family:var(--mono);font-size:11px;line-height:1.5}
pre:empty{display:none}
.ok{color:var(--accent);font-weight:700}
.err{color:var(--red);font-weight:700}
.hint{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:9px 11px;font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<header>
  <span class="logo">Kanana<span> 動画編集</span></span>
  <span class="badge on" id="engineBadge">ネイティブffmpeg同梱</span>
  <span class="badge">完全オフライン</span>
</header>
<main>
  <div class="card">
    <h2>STEP 1 — 動画を選ぶ</h2>
    <div class="drop" id="drop">
      <div class="big">🎬</div>
      <div><b>クリックして選ぶ</b>か、ここにドラッグ＆ドロップ</div>
      <div class="muted">mp4 / mov / avi / mkv / webm など。ファイルは端末内だけで処理されます</div>
    </div>
    <div class="file" id="fileBox" style="display:none">
      <span>📄</span><b id="fileName"></b><span class="muted" id="fileSize"></span>
    </div>
  </div>

  <div class="card">
    <h2>STEP 2 — やることを決める</h2>
    <div class="grid2">
      <div>
        <label for="mode">処理</label>
        <select id="mode">
          <option value="video">動画を書き出す（切り抜き・リサイズ・圧縮）</option>
          <option value="copy">切り抜きだけ（無劣化・一瞬で終わる）</option>
          <option value="audio">音声を抜き出す（m4a）</option>
          <option value="thumb">サムネイル画像（jpg）</option>
          <option value="gif">GIFにする</option>
        </select>
      </div>
      <div>
        <label for="width">横幅(px)・空欄で元のまま</label>
        <input id="width" type="number" min="16" step="2" placeholder="例: 1280">
      </div>
    </div>
    <div class="grid3">
      <div><label for="start">開始（秒 または 00:01:23）</label><input id="start" placeholder="例: 5"></div>
      <div><label for="end">終了（秒 または 00:02:00）</label><input id="end" placeholder="例: 65"></div>
      <div id="qBox"><label for="crf">画質（小さいほど高画質・23が標準）</label><input id="crf" type="number" min="0" max="51" value="23"></div>
    </div>
    <div id="presetBox">
      <label for="preset">エンコード速度</label>
      <select id="preset">
        <option value="veryfast" selected>veryfast（速い・標準）</option>
        <option value="medium">medium（バランス）</option>
        <option value="slow">slow（低速・高圧縮）</option>
      </select>
    </div>
    <p class="hint" id="modeHint" style="margin-top:10px"></p>
  </div>

  <div class="card">
    <h2>STEP 3 — 実行</h2>
    <div class="row">
      <button class="primary" id="run" disabled>▶ 保存先を選んで実行</button>
      <button class="danger" id="cancel" disabled>■ 中止</button>
      <button id="openOut" style="display:none">📂 保存先を開く</button>
    </div>
    <div class="bar"><i id="barFill"></i></div>
    <div class="row"><span id="status" class="muted">動画を選ぶと実行できます。</span><span class="muted" id="speed" style="margin-left:auto"></span></div>
    <details style="margin-top:10px"><summary class="muted" style="cursor:pointer">詳細ログ</summary><pre id="log"></pre></details>
  </div>
</main>
<script src="app.js"></script>
</body>
</html>
